<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clothing Size Matcher</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Clothing Size Matcher</h1>
        <p>Enter your measurements and clothing description to find matching items</p>
        
        <div class="search-type">
            <button id="topsBtn" class="active">Search Tops</button>
            <button id="bottomsBtn">Search Bottoms</button>
        </div>
        
        <form id="searchForm">
            <div class="form-group">
                <label for="size">Size:</label>
                <select id="size" name="size">
                    <option value="">Select Size</option>
                    <option value="S">S</option>
                    <option value="M">M</option>
                    <option value="L">L</option>
                    <option value="XL">XL</option>
                    <option value="2XL">2XL</option>
                    <option value="3XL">3XL</option>
                    <option value="4XL">4XL</option>
                </select>
            </div>

            <div class="measurements" id="measurements">
                <!-- Tops measurements -->
                <div class="top-measurements">
                    <h3>Measurements (in inches)</h3>
                    
                    <div class="form-group">
                        <label for="chest">Chest (inches):</label>
                        <input type="number" id="chest" name="chest" placeholder="e.g., 34-36" step="0.5">
                    </div>

                    <div class="form-group">
                        <label for="waist">Waist (inches):</label>
                        <input type="number" id="waist" name="waist" placeholder="e.g., 28-30" step="0.5">
                    </div>

                    <div class="form-group">
                        <label for="neck">Neck (inches):</label>
                        <input type="number" id="neck" name="neck" placeholder="e.g., 14-14.5" step="0.5">
                    </div>

                    <div class="form-group">
                        <label for="sleeve">Sleeve (inches):</label>
                        <input type="number" id="sleeve" name="sleeve" placeholder="e.g., 32.5-33" step="0.5">
                    </div>
                </div>

                <!-- Bottoms measurements -->
                <div class="bottom-measurements" style="display: none;">
                    <h3>Measurements (in inches)</h3>
                    
                    <div class="form-group">
                        <label for="waist">Waist (inches):</label>
                        <input type="number" id="waist" name="waist" placeholder="e.g., 28-30" step="0.5">
                    </div>

                    <div class="form-group">
                        <label for="inseam">Inseam (inches):</label>
                        <input type="number" id="inseam" name="inseam" placeholder="e.g., 32" step="0.5">
                    </div>
                </div>
            </div>

            <div class="form-group">
                <label for="description">Clothing Description:</label>
                <textarea id="description" name="description" placeholder="e.g., blue jeans, black t-shirt, formal shirt" required></textarea>
            </div>

            <button type="submit">Search for Clothing</button>
        </form>

        <div id="results"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
